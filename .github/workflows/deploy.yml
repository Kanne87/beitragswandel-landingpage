name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image name
        id: image
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Deploy to Coolify via API Gateway
        if: success()
        run: |
          RESPONSE=$(curl -s -o /tmp/deploy.txt -w "%{http_code}" -X POST \
            https://api-gateway.kailohmann.de/execute \
            -H "X-Gateway-Key: kai-gw-2026-x7k9m2p4" \
            -H "Content-Type: application/json" \
            -d '{"service":"coolify","action":"deploy","params":{"uuid":"zck4w0w0wcc88gg044gccco0","force":true}}')
          echo "HTTP: $RESPONSE"
          cat /tmp/deploy.txt
          echo ""
          [ "$RESPONSE" -ge 200 ] && [ "$RESPONSE" -lt 300 ]
